<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinevo Movies</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Inter,sans-serif;
cursor:none;
overflow:hidden;
}

.back-btn{
position:fixed;
top:25px;
left:25px;
font-size:2rem;
cursor:pointer;
z-index:9999;
transition:0.3s;
}

.back-btn:hover{
transform:scale(1.1);
color:#bcaeff;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:5rem;
}

.hero p{
margin-top:15px;
color:#cfcfcf;
font-size:1.2rem;
}

.cursor-dot{
width:14px;
height:14px;
background:#bcaeff;
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
box-shadow:0 0 20px rgba(120,120,255,0.9);
z-index:99999;
}

.cursor-ring{
width:40px;
height:40px;
border:2px solid rgba(180,180,255,0.5);
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:99998;
transition:0.15s;
}

</style>
</head>

<body>

<div class="back-btn" onclick="window.location.href='index.html'">
❮
</div>

<div class="cursor-dot"></div>
<div class="cursor-ring"></div>

<section class="hero">

<h1>Movies</h1>

<p>
No Movies Have Been Put On Yet
</p>

</section>

<script>

const dot=document.querySelector('.cursor-dot');
const ring=document.querySelector('.cursor-ring');

document.addEventListener('mousemove',e=>{

dot.style.left=e.clientX+'px';
dot.style.top=e.clientY+'px';

ring.style.left=e.clientX+'px';
ring.style.top=e.clientY+'px';

});

</script>

</body>
</html>
